name = "modinverse"
defaultTargets = ["ModInverse", "Gate"]

# Pinned to match the Aeneas Lean backend (Lean 4.30.0-rc2 + mathlib v4.30.0-rc2),
# so the Aeneas-extracted machine model and the hand model live in one project.
[[require]]
name = "mathlib"
scope = "leanprover-community"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.30.0-rc2"

# Aeneas's Lean support library (`Aeneas.Std`, the `Result` monad, fixed-width
# scalars). Needed to typecheck the extracted `modinverse_u128`.
[[require]]
name = "aeneas"
git = "https://github.com/AeneasVerif/aeneas.git"
rev = "a2e779f00fc384c2f4d1131bbd573dc948ddf0d7"
subDir = "backends/lean"

[[lean_lib]]
name = "ModInverse"
# The root `ModInverse.lean` (human-maintained spec only) does not import the
# AI-maintained model and proofs under `ModInverse/`, so glob them in explicitly —
# otherwise `lake build` would compile only the root and silently skip every proof.
globs = ["ModInverse", "ModInverse.*"]

# The gate (trusted, human-maintained): re-types the 14 end-to-end certificates at
# frozen statements and fails the build on any disallowed axiom in their closures.
[[lean_lib]]
name = "Gate"

# The Aeneas-extracted machine code (`charon` + `aeneas`) is the sole machine-
# generated source and lives outside the proof tree, in `../extraction`, so the
# extraction's own `sorry` (the unused generic egcd path) never trips the
# `no sorry in proof/` check. The proof imports it as `import Machine`. The module
# is named `Machine` rather than `Modinverse` because the latter collides with the
# `ModInverse` root on case-insensitive filesystems (macOS).
[[lean_lib]]
name = "Machine"
srcDir = "../extraction"
