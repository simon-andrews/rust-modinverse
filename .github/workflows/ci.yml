name: CI

on:
  push:
  pull_request:

jobs:
  check-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: extractions/setup-just@v2
      - run: just no-sorry
      - run: just no-rogue-axioms
      - run: just trusted-unchanged

  check-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v2
      - run: just check

  check-lean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Installs elan and restores the mathlib cache; build: false hands the
      # build itself to the justfile so CI and local runs share one definition.
      - uses: leanprover/lean-action@v1
        with:
          lake-package-directory: proof
          build: false
      - uses: extractions/setup-just@v2
      - run: just prove-correctness
